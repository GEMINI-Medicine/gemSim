jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.NEW_PAT }}
    steps:
      - uses: actions/checkout@v3

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install dependencies
        run: |
          Rscript -e 'install.packages(c("devtools", "pkgdown", "remotes"))'
          Rscript -e 'remotes::install_local(".")'

      - name: Build & Deploy pkgdown site
        run: |
          mkdir -p docs                 # ensure docs/ exists
          git config --local user.name "$GITHUB_ACTOR"
          git config --local user.email "$GITHUB_ACTOR@users.noreply.github.com"
          Rscript -e 'pkgdown::deploy_to_branch(branch = "gh-pages", force = TRUE, new_process = FALSE)'